version: "3.8"

services:
  # Service API FastAPI
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fit4110-api-lab05
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      analytics-service:
        condition: service_healthy
    networks:
      - team-internal
      - class-net
    ports:
      - "${APP_PORT:-8000}:8000"
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # PostgreSQL database service (TimescaleDB for team-analytics)
  db:
    image: timescale/timescaledb:latest-pg15
    container_name: fit4110-db-lab05
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lab05}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lab05pass}
      POSTGRES_DB: ${POSTGRES_DB:-iotdb}
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - team-internal
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lab05} -d ${POSTGRES_DB:-iotdb}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Analytics service
  analytics-service:
    build:
      context: ./src/analytics_service
      dockerfile: Dockerfile
    container_name: fit4110-analytics-lab05
    env_file:
      - .env
    ports:
      - "9000:9000"
    networks:
      - team-internal
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:9000/health')\" || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # Mosquitto MQTT Broker
  mqtt:
    image: eclipse-mosquitto:2
    container_name: fit4110-mqtt-lab05
    ports:
      - "1883:1883"
    volumes:
      - ./mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf
    networks:
      - team-internal

networks:
  team-internal:
    driver: bridge
  class-net:
    external: true

volumes:
  db-data:
